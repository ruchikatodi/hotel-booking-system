<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Novacrest Hotel</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">NOVA<span>CREST</span></div>
            <h2>Welcome Back</h2>
            <p>Sign in to continue to your account</p>

            <form id="loginForm" onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label>Email Address</label>
                    <!-- FIXED: Changed id from loginEmail to email -->
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <!-- FIXED: Changed id from loginPassword to password -->
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary full-width">
                    Sign In
                </button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <div id="alertContainer"></div>
    <!-- FIXED: Correct path to script -->
    <script src="/static/js/script.js"></script>
</body>
</html>
