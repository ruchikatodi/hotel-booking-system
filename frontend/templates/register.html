<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Novacrest Hotel</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">NOVA<span>CREST</span></div>
            <h2>Create Your Account</h2>
            <p>Join us for an unforgettable stay</p>

            <form id="registerForm" onsubmit="event.preventDefault(); register();">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="registerFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="registerLastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="registerEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone (Optional)</label>
                    <input type="tel" id="registerPhone" placeholder="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="Minimum 8 characters" required>
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary full-width">
                    Create Account
                </button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <div id="alertContainer"></div>
    <script src="/static/js/script.js"></script>
</body>
</html>
