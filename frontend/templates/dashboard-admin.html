<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Novacrest</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body id="adminDashboardPage">
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">NOVA<span>CREST</span></a>
                <div class="nav-links">
                    <span id="userInfo">Admin</span>
                    <button onclick="logout()" class="btn btn-danger">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <section class="admin-dashboard">
            <div class="container">
                <h1 class="section-title left">Admin Dashboard</h1>
                <p class="eyebrow" style="margin-bottom: 2rem;">Manage hotel bookings and physical rooms configuration</p>
                
                <div id="adminDashboard" class="admin-panel-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap:30px; margin-top: 2rem;">

                    <!-- Booking Management -->
                    <section class="admin-panel-card">
                        <h2>Booking Management</h2>
                        <div style="margin: 1rem 0;">
                            <label for="adminBookingStatus" style="font-weight: 500;">Filter by Status:</label>
                            <select id="adminBookingStatus" onchange="loadAdminBookings()" style="margin-top: 0.5rem; display: block; width: 100%;">
                                <option value="">All statuses</option>
                                <option value="pending">Pending</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="checked_in">Checked in</option>
                                <option value="checked_out">Checked out</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        <div class="table-scroll">
                            <table class="table" style="margin-top: 0;">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Customer</th>
                                        <th>Room</th>
                                        <th>Dates</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="adminBookingsTable">
                                    <tr><td colspan="7" style="text-align: center;">Loading bookings...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <!-- Room Management -->
                    <section class="admin-panel-card">
                        <h2>Room Management</h2>
                        <div style="margin: 1rem 0;">
                            <p style="font-weight: 500; margin-bottom: 0.5rem;">Add New Physical Room:</p>
                            <form class="admin-form" onsubmit="event.preventDefault(); addAdminRoom();" style="margin: 0; display: flex; gap: 0.5rem;">
                                <input id="newRoomNumber" placeholder="Room #" style="flex: 1;" required>
                                <input id="newRoomCategory" type="number" placeholder="Cat ID" style="width: 80px;" required>
                                <input id="newRoomFloor" type="number" placeholder="Floor" style="width: 80px;" required>
                                <button class="btn btn-primary" type="submit" style="padding: 0.6rem 1rem;">Add</button>
                            </form>
                        </div>
                        <div class="table-scroll">
                            <table class="table" style="margin-top: 0;">
                                <thead>
                                    <tr>
                                        <th>Room #</th>
                                        <th>Category</th>
                                        <th>Floor</th>
                                        <th>Status</th>
                                        <th>Base Price</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="adminRoomsTable">
                                    <tr><td colspan="6" style="text-align: center;">Loading rooms...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                </div>
            </div>
        </section>
    </main>

    <div id="alertContainer"></div>
    <script src="/static/js/script.js"></script>
</body>
</html>
