<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Novacrest</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body id="userDashboardPage">
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">NOVA<span>CREST</span></a>
                <div class="nav-links">
                    <span id="userInfo"></span>
                    <button onclick="logout()" id="logoutBtn">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <section class="dashboard">
        <div class="container">
            <h1>My Bookings</h1>
            <div id="bookingsContainer" style="
                margin-top: 30px;
                background: #ffffff;
                padding: 25px;
                border-radius: 16px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            ">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-accent" onclick="loadUserBookings('upcoming')">Upcoming</button>
                    <button class="btn btn-accent" onclick="loadUserBookings('active')">Active</button>
                    <button class="btn btn-accent" onclick="loadUserBookings('past')">Past</button>
                    <button class="btn btn-accent" onclick="loadUserBookings('all')">All</button>
                </div>
                <table class="bookings-table" style="width: 100%; border-collapse: collapse; font-size: 1rem;">
                    <thead>
                        <tr style="background: #faf7f0; color: #333;">
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Booking ID</th>
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Room</th>
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Check-In</th>
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Check-Out</th>
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Total</th>
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Status</th>
                            <th style="padding: 14px; border-bottom: 2px solid #e0d9c8;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable">
                        <tr><td colspan="7" style="text-align:center; padding:20px;">Loading your bookings...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </section>

    <!-- QR Check-in Modal -->
    <div id="qrCheckInModal" class="modal">
        <div class="modal-content" style="text-align: center; max-width: 450px; margin: 10% auto; padding: 2.5rem;">
            <span class="close-modal" onclick="closeQrModal()">&times;</span>
            <span class="eyebrow">Digital Check-In</span>
            <h2 style="font-family: var(--font-serif); font-weight: 400; margin-top: 0.5rem; margin-bottom: 1rem; font-size: 1.8rem;">Check-in QR Code</h2>
            <p style="color: #666; font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.5rem;">Present this QR code at the reception desk upon arrival, or scan it below to check in automatically.</p>
            
            <div style="margin: 1.5rem auto; width: 180px; height: 180px; padding: 10px; background: white; border: 1px solid var(--color-sand); display: flex; align-items: center; justify-content: center; border-radius: var(--border-radius);">
                <!-- Dynamically loaded image -->
                <img id="qrCodeImg" src="" alt="Booking Check-in QR" style="width: 160px; height: 160px;">
            </div>
            
            <p style="font-size: 0.9rem; color: var(--color-gold); font-weight: 600; margin-bottom: 2rem;" id="qrBookingDetails"></p>
            
            <button id="simulateScanBtn" class="btn btn-primary full-width" onclick="simulateSelfCheckIn()">Scan & Self Check-in</button>
        </div>
    </div>

    <div id="alertContainer"></div>
    <script src="/static/js/script.js"></script>
    <!-- <script>
        document.addEventListener('DOMContentLoaded', loadUserBookings);
    </script> -->
</body>
</html>
